            <div class="col-md-3">
                <h2 class="counter" data-target="5000">0</h2>
                <p>Trees Planted</p>
            </div>
            <div class="col-md-3">
                <h2 class="counter" data-target="10000">0</h2>

            </div>
            <div class="col-md-3">
                <h2 class="counter" data-target="50">0</h2>

            </div>

                <p>Products</p>
            </div>
        </div>
    </div>
</div>

<div id="progressBar"></div>

<!-- Floating Action Buttons -->
<div class="fab-container">

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="EcoStore - Your one-stop shop for sustainable, eco-friendly products">
<meta name="keywords" content="eco-friendly, sustainable, green products, reusable">
<meta name="author" content="EcoStore">
<meta property="og:title" content="EcoStore - Sustainable Living">
<meta property="og:description" content="Shop eco-friendly products for a sustainable lifestyle">

<button id="darkModeToggle" class="btn btn-outline-light ms-2">🌙 Dark Mode</button>
    <title>Document</title>
</head>
<body>
   <button id="scrollTopBtn" title="Back to Top">↑</button> 
</body>

<div id="toastContainer" class="toast-container"></div>


<!-- Newsletter Popup -->
<div id="newsletterPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div class="popup-content bg-white p-5 rounded shadow" style="max-width:400px; position:relative;">
        <button onclick="closeNewsletterPopup()" style="position:absolute; top:10px; right:15px; border:none; background:none; font-size:24px;">×</button>
        <h3 class="text-center">🌿 Join Our Community</h3>
        <p class="text-center">Get 10% off your first order!</p>
        <form id="popupNewsletterForm">
            <input type="email" id="popupEmail" class="form-control mb-2" placeholder="Your email" required>
            <button type="submit" class="btn btn-success w-100">Subscribe</button>
        </form>
    </div>
</div>

<div id="progressBar"></div>

<!-- Floating Action Buttons -->
<div class="fab-container">
    <button class="fab" title="Top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
    <button class="fab" title="Contact" onclick="window.location.href='contact.html'">✉</button>
    <button class="fab" title="Shop" onclick="window.location.href='products.html'">🛒</button>
</div>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="EcoStore - Your one-stop shop for sustainable, eco-friendly products">
<meta name="keywords" content="eco-friendly, sustainable, green products, reusable">
<meta name="author" content="EcoStore">
<meta property="og:title" content="EcoStore - Sustainable Living">
<meta property="og:description" content="Shop eco-friendly products for a sustainable lifestyle">

<button id="darkModeToggle" class="btn btn-outline-light ms-2">🌙 Dark Mode</button>


<div id="loadingSpinner" class="spinner"></div>

    <title>Document</title>

    
</head>
<body>
    
<div class="row mb-4">
    <div class="col-md-6 mx-auto">
        <input type="text" id="productSearch" class="form-control" 
               placeholder=" Search products...">
    </div>
</div>

<!-- Shopping Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header">
        <h5>🛒 Your Cart</h5>
        <button id="closeCartBtn" class="btn-close"></button>
    </div>
    <div id="cartItemsList" class="cart-items"></div>
    <div class="cart-footer">
        <div class="d-flex justify-content-between">
            <span>Total:</span>
            <span id="cartTotalPrice">$0.00</span>
        </div>
        <button id="checkoutBtn" class="btn btn-success w-100 mt-2">Checkout</button>
    </div>
</div>

<!-- Cart Toggle Button -->
<button id="cartToggle" class="cart-toggle">
    🛒 <span id="cartCountBadge">0</span>
</button>
    <button id="scrollTopBtn" title="Back to Top">↑</button>
</body>

<div id="toastContainer" class="toast-container"></div>

</html>

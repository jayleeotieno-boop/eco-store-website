            <h1 class="text-center mb-4">🛍️ Our Products</h1>
<p class="text-center mb-4">Shop our curated collection of sustainable alternatives</p>

            <!-- Search & Sort -->
<div class="row mb-4">
    <div class="col-md-4">
        <input type="text" id="productSearch" class="form-control" placeholder="🔍 Search products...">
    </div>
    <div class="col-md-4">
        <select id="sortProducts" class="form-select">
            <option value="default">Sort by: Default</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
            <option value="name">Name: A-Z</option>
        </select>
    </div>
    <div class="col-md-4">
        <label>Price: $<span id="priceValue">50</span></label>
        <input type="range" id="priceRange" min="0" max="100" value="50" class="form-range">
    </div>
</div>

<!-- Filter Buttons -->
<div class="text-center mb-4">
    <button class="btn btn-outline-success filter-btn active" data-filter="all">All</button>
    <button class="btn btn-outline-success filter-btn" data-filter="kitchen">Kitchen</button>
    <button class="btn btn-outline-success filter-btn" data-filter="bathroom">Bathroom</button>
    <button class="btn btn-outline-success filter-btn" data-filter="on-the-go">On-The-Go</button>
</div>


<!-- Loading Spinner -->
<div id="loadingSpinner" class="spinner"></div>
            <!-- ===== ADD THIS LINE RIGHT HERE ===== -->

<div class="fab-container">
        <button class="fab" title="Top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
        <button class="fab" title="Contact" onclick="window.location.href='contact.html'">✉</button>
        <button class="fab" title="Shop" onclick="window.location.href='products.html'">🛒</button>
    </div>
    
    <button id="scrollTopBtn" title="Back to Top">↑</button>


    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h5>🛒 Your Cart</h5>
            <button id="closeCartBtn" class="btn-close"></button>
        </div>
        <div id="cartItemsList" class="cart-items"></div>
        <div class="cart-footer">
            <div class="d-flex justify-content-between">
                <span>Total:</span>
                <span id="cartTotalPrice">$0.00</span>
            </div>
            <button id="checkoutBtn" class="btn btn-success w-100 mt-2">Checkout</button>
            <button id="clearCartBtn" class="btn btn-danger w-100 mt-2">Clear Cart</button>
        </div>
    </div>

     <div class="rating">
        <span class="star star-1" onclick="setRating(1, 1)">★</span>
        <span class="star star-1" onclick="setRating(1, 2)">★</span>
        <span class="star star-1" onclick="setRating(1, 3)">★</span>
        <span class="star star-1" onclick="setRating(1, 4)">★</span>
        <span class="star star-1" onclick="setRating(1, 5)">★</span>
    </div>

    <button class="btn btn-outline-danger btn-sm mt-2 wishlist-btn" 
            data-product-id="1" onclick="toggleWishlist(1, 'Bamboo Toothbrush')">
        🤍
    </button>
    

    <button id="cartToggle" class="cart-toggle">
        🛒 <span id="cartCountBadge">0</span>
    </button>

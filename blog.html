<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="EcoStore - Your one-stop shop for sustainable, eco-friendly products">
<meta name="keywords" content="eco-friendly, sustainable, green products, reusable">
<meta name="author" content="EcoStore">
<meta property="og:title" content="EcoStore - Sustainable Living">
<meta property="og:description" content="Shop eco-friendly products for a sustainable lifestyle">

<button id="darkModeToggle" class="btn btn-outline-light ms-2">🌙 Dark Mode</button>
    <title>Document</title>
</head>
<body>
    <button id="scrollTopBtn" title="Back to Top">↑</button>
</body>

<!-- Blog Search and Filter -->
<div class="row mb-4">
    <div class="col-md-6">
        <input type="text" id="blogSearch" class="form-control" 
               placeholder="🔍 Search blog posts...">
    </div>
    <div class="col-md-6">
        <select id="blogFilter" class="form-select">
            <option value="all">All Categories</option>
            <option value="sustainability">Sustainability</option>
            <option value="tips">Eco Tips</option>
            <option value="products">Products</option>
        </select>
    </div>
</div>

<div class="blog-post" data-category="sustainability">
    <!-- blog content -->
</div>

<div id="progressBar"></div>

<!-- Floating Action Buttons -->
<div class="fab-container">
    <button class="fab" title="Top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
    <button class="fab" title="Contact" onclick="window.location.href='contact.html'">✉</button>
    <button class="fab" title="Shop" onclick="window.location.href='products.html'">🛒</button>
</div>

<!-- Breadcrumb Navigation -->
<nav aria-label="breadcrumb" class="container mt-3">
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="index.html">Home</a></li>
        <li class="breadcrumb-item active" aria-current="page">Current Page</li>
    </ol>
</nav>

<!-- Social Share Buttons -->
<div class="share-buttons mt-3">
    <button onclick="shareOnSocial('facebook', window.location.href, '${title}')" class="btn btn-primary btn-sm">Facebook</button>
    <button onclick="shareOnSocial('twitter', window.location.href, '${title}')" class="btn btn-info btn-sm">Twitter</button>
    <button onclick="shareOnSocial('whatsapp', window.location.href, '${title}')" class="btn btn-success btn-sm">WhatsApp</button>
</div>

</html>
